name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# Least-privilege: contents read for checkout; packages write only for GHCR push.
permissions:
  contents: read

jobs:
  # Build the hosted web image and publish it to GitHub Container Registry.
  docker:
    name: Docker image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the owner (GHCR requires lowercase names).
          images: ghcr.io/${{ github.repository_owner }}/microtonal-keyboard
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Build the unsigned desktop apps. Runs only on version tags or manual dispatch
  # (it downloads Electron per-OS and takes several minutes).
  desktop:
    name: Desktop app (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            run: npm run dist:mac
          - os: windows-latest
            run: npx electron-builder --win nsis zip
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build distributables
        run: ${{ matrix.run }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # unsigned builds

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe

  # On a version tag, collect the desktop binaries and publish them on a public
  # GitHub Release (downloadable by anyone, no login — unlike workflow artifacts).
  release:
    name: GitHub Release
    needs: desktop
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          fail_on_unmatched_files: true
