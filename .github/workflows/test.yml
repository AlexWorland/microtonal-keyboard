name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests (node --test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # The pure-logic modules (tuning.js, piano.js, layout.js) are tested with the
      # built-in Node test runner and have no dependencies, so no install step.
      - name: Run unit tests
        run: node --test
