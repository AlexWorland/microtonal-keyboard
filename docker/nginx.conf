server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip text assets (the .js modules + css compress well).
    gzip              on;
    gzip_vary         on;
    gzip_min_length   256;
    gzip_types        text/css text/javascript application/javascript image/svg+xml application/json;

    # Liveness/readiness probe.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # App shell.
    location / {
        try_files $uri $uri/ =404;
    }

    # Short cache for static assets (app is tiny; favours quick updates over CDN-style caching).
    location ~* \.(?:js|css|svg|png|ico|woff2)$ {
        expires 1h;
        add_header Cache-Control "public";
    }
}
