services:
  microtonal-keyboard:
    build: .
    image: microtonal-keyboard:latest
    container_name: microtonal-keyboard
    ports:
      # host:container — change the left side to expose a different local port.
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
